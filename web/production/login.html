<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in | EpiElla</title>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="module" src="/epiella/main.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">E</div>
      <div class="brand-name">EpiElla <small style="font-weight:400;color:var(--text-muted);font-size:13px;margin-left:2px">v4</small></div>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to continue to your dashboard.</div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 5l6 4 6-4"/></svg>
          <input type="email" id="email" name="email" class="form-control" placeholder="admin@localhost" value="admin@localhost" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/></svg>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <div id="login-error" class="form-hint" style="color:var(--danger);display:none;margin-bottom:12px"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;height:38px">
        Sign in
      </button>
    </form>
  </div>
</div>

<script type="module">
import { login } from '/epiella/auth.js';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await login(email, password);
    window.location.href = 'index.html';
  } catch (err) {
    errEl.textContent = err.message || 'Login failed';
    errEl.style.display = 'block';
  }
});
</script>

</body>
</html>
